[system]
compatible=@COMPATIBLE@
bootloader=uboot
data-directory=/data/

[keyring]
path=/etc/rauc/ca.cert.pem

[streaming]
# mTLS client authentication for OTA server
# Run streaming helper as dedicated OTA user
sandbox-user=ota
tls-cert=/etc/ota/device.crt
tls-key=@TLS_KEY@
tls-ca=/etc/ota/ca.crt
# Send device info as HTTP headers
send-headers=boot-id;machine-id;transaction-id;system-version
# Manual OTA streaming examples:
#   iotgw-rauc-install https://<ota-host>:8443/bundles/<bundle>.raucb
#   curl --cert /etc/ota/device.crt --key /etc/ota/device.key \
#        --cacert /etc/ota/ca.crt \
#        -fsS https://<ota-host>:8443/api/v1/manifest.json
#   (PKCS#11 mode uses tls-key=pkcs11:... and is handled by RAUC directly.)

[log.ota]
# Relative path -> stored under data-directory (/data)
filename=rauc-events.log
# Keep focused OTA audit trail (install lifecycle + slot marking)
events=install;mark
format=json
# Tight rotation to avoid unbounded growth on gateway storage
max-size=512K
max-files=3

[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootA
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootB
type=ext4
bootname=B
