# Managed overlay reconciliation paths.
# Format: <policy> <absolute /etc path> [optional]
# Policies: enforce | replace_if_unmodified | preserve | absent | enforce_meta
# optional: when set, missing desired file in target slot is expected and logged
#           as info (not warning). Useful for image/feature-specific files.
# absent: desired state is path not present in overlay upper; stale overlays are removed.

# Platform baseline: always follow image content after OTA.
enforce /etc/nftables.conf
enforce /etc/default/otbr-webui optional
absent /etc/default/otbr-web
enforce /etc/version
enforce /etc/buildinfo
enforce /etc/rauc/system.conf
enforce /etc/fw_env.config
# Identity databases: always follow slot content after OTA.
# enforce here means any upper-layer entry (stale overlay) is replaced with
# the slot's copy when they differ. This ensures service accounts added by
# new recipes are visible on first boot of the updated slot.
# Consequence: runtime changes via useradd/usermod/passwd on /etc are NOT
# persistent across OTA. Use provisioning recipes for operator accounts.
enforce /etc/passwd
enforce /etc/group
enforce /etc/shadow
enforce /etc/gshadow
enforce /etc/login.defs
enforce /etc/sysctl.d/90-iotgw.conf
enforce /etc/systemd/journald.conf.d/iotgw.conf
enforce /etc/systemd/system/sshd@.service optional
# OpenSSH baselines: accept OTA recipe fixes unless operator modified locally.
replace_if_unmodified /etc/default/ssh optional
replace_if_unmodified /etc/ssh/sshd_config_readonly optional
enforce /etc/tmux.conf optional
# Network stack policy: NetworkManager-only profile. Keep explicit masks in
# /etc/systemd/system resilient across OTA slot changes.
enforce /etc/systemd/system/NetworkManager-wait-online.service optional
enforce /etc/systemd/system/systemd-network-generator.service optional
enforce /etc/systemd/system/systemd-networkd.service optional
enforce /etc/systemd/system/systemd-networkd.socket optional
enforce /etc/systemd/system/systemd-networkd-wait-online.service optional
absent /etc/systemd/system/network-online.target.wants/NetworkManager-wait-online.service
absent /etc/systemd/system/network-online.target.wants/systemd-networkd-wait-online.service
# Runtime observability netmode drop-ins are operator-controlled.
preserve /etc/systemd/system/telegraf.service.d/99-runtime-netmode.conf optional
preserve /etc/systemd/system/mosquitto.service.d/99-runtime-netmode.conf optional
preserve /etc/systemd/system/influxdb.service.d/99-runtime-netmode.conf optional
# TPM policy files (present when TPM profile is enabled).
enforce /etc/environment.d/50-iotgw-tpm.conf optional
enforce /etc/profile.d/iotgw-tpm-env.sh optional
enforce /etc/systemd/system.conf.d/10-iotgw-tpm-defaults.conf optional
# Runtime-managed TPM2 PKCS#11 PIN file used by RAUC pin-source URI.
# It may be absent in slot content (provisioned at runtime), but when present
# in overlay we enforce ownership/mode for sandbox-user=ota access.
enforce_meta /etc/ota/pkcs11-pin uid=root gid=ota mode=0640 optional
absent /etc/systemd/system/rauc-mark-good.service
absent /etc/systemd/system/boot-backup-prune.service
