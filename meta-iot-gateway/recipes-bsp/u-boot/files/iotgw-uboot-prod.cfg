# ── U-Boot production lockdown — token: appliance_lockdown ────────────────────
# Production only. Do NOT include in dev builds.
# Requires a production FIT signing key embedded in U-Boot's control DTB
# (UBOOT_SIGN_KEYNAME must not contain "dev" — enforced by key guard).

# ── Boot delay ────────────────────────────────────────────────────────────────

# Compile -2 as the built-in default to eliminate the interactive window
# before iotgw-provision.sh has run fw_setenv on first boot of a fresh flash.
# IOTGW_UBOOT_BOOTDELAY runtime-env mechanism remains active post-provisioning.
CONFIG_BOOTDELAY=-2

# Keyed autoboot is irrelevant with BOOTDELAY=-2 but disable explicitly
# so the stop-string committed in patch 0001 cannot be used even if the
# env partition is tampered to restore a positive delay value.
CONFIG_AUTOBOOT_KEYED=n

# ── Environment protection ────────────────────────────────────────────────────

# Remove interactive env editing command.
CONFIG_CMD_EDITENV=n

# Keep runtime writes constrained to RAUC-required variables.
CONFIG_ENV_WRITEABLE_LIST=y
# Under ENV_WRITEABLE_LIST, only variables with :w access are mutable.
# Keep RAUC state writable and lock appliance gates read-only.
CONFIG_ENV_FLAGS_LIST_STATIC="BOOT_ORDER:sw,BOOT_A_LEFT:dw,BOOT_B_LEFT:dw,bootcount:dw,upgrade_available:dw,iotgw_appliance:sr,iotgw_enable_netboot:sr,iotgw_diag:sr,iotgw_bootstage:sr"

# Prevent the -f (force) flag from bypassing variable access controls.
CONFIG_ENV_ACCESS_IGNORE_FORCE=y
