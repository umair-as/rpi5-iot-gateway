# -- U-Boot watchdog support - token: watchdog -------------------------------
# Development/evaluation only until issue #78 policy validation is complete.
#
# Enable the BCM2835/BCM2711-class watchdog driver and the `wdt` command, but
# do not autostart it during U-Boot init. The IoT Gateway boot environment
# starts/stops it explicitly so intentional RAUC halt states remain observable
# instead of becoming hidden reset loops.

CONFIG_WDT=y
CONFIG_WDT_BCM2835=y
CONFIG_CMD_WDT=y
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_AUTOSTART=n
CONFIG_WATCHDOG_TIMEOUT_MSECS=15000
