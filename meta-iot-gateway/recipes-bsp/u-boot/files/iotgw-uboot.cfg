# RAUC boot safety and basic hardening

# Enable bootcount and rollback protection via environment backend
CONFIG_BOOTCOUNT_LIMIT=y
CONFIG_BOOTCOUNT_ENV=y

# Provide a brief window to interrupt with a specific string
CONFIG_BOOTDELAY=2
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_PROMPT="Autoboot in 2s - type 'igw' to stop\n"
CONFIG_AUTOBOOT_STOP_STR="igw"

# Skip generic preboot probing (e.g. pci/usb init) for appliance boot path
CONFIG_USE_PREBOOT=n

# Ensure FIT is available; signature enforcement will be enabled for prod later
CONFIG_FIT=y
CONFIG_FIT_VERBOSE=y
CONFIG_FIT_SIGNATURE=y
CONFIG_RSA=y
CONFIG_RSA_PUBLIC_KEY_PARSER=y
CONFIG_SHA256=y
CONFIG_BOOTSTAGE=y
CONFIG_CMD_BOOTSTAGE=y
CONFIG_BOOTSTAGE_RECORD_COUNT=100
CONFIG_BOOTSTAGE_FDT=y

# Add identifier to U-Boot banner
CONFIG_IDENT_STRING=" (IoT-Gateway)"
CONFIG_DISPLAY_CPUINFO=n
CONFIG_DISPLAY_BOARDINFO=n

# Headless gateway profile: disable U-Boot video/splash path.
CONFIG_CMD_BMP=n
CONFIG_BMP=n
CONFIG_VIDEO_BMP=n
CONFIG_VIDEO=n
CONFIG_DM_VIDEO=n


# Keep environment in a writable backend (RAUC needs to update slot vars)
# Do NOT disable saveenv or move env to NOWHERE
CONFIG_ENV_FAT_DEVICE_AND_PART="0:2"

# Remove built-in U-Boot logo to avoid brief 'boat' flicker
CONFIG_VIDEO_LOGO=n

# Keep Standard Boot framework, but disable distro/EFI bootmeth chain so
# gateway boot stays script-only and avoids EFI probing paths.
CONFIG_BOOTSTD_DEFAULTS=n
CONFIG_EFI_LOADER=n
CONFIG_EFI_BOOTMGR=n
CONFIG_EFI_BINARY_EXEC=n
CONFIG_BOOTMETH_EFILOADER=n
CONFIG_BOOTMETH_EFI_BOOTMGR=n
CONFIG_GENERATE_SMBIOS_TABLE=n
CONFIG_SMBIOS=n
CONFIG_SYSINFO_SMBIOS=n

# U-Boot diagnostics: disable verbose DM/FDT runtime logging for normal boots.
CONFIG_LOG=n
CONFIG_LOG_CONSOLE=n
