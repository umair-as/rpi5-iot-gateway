# RAUC boot safety and basic hardening

# Enable bootcount and rollback protection via environment backend
CONFIG_BOOTCOUNT_LIMIT=y
CONFIG_BOOTCOUNT_ENV=y

# Provide a brief window to interrupt with a specific string
CONFIG_BOOTDELAY=3
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_PROMPT="Autoboot in 3s - type 'iotgw' to stop\n"
CONFIG_AUTOBOOT_STOP_STR="iotgw"

# Ensure FIT is available; signature enforcement will be enabled for prod later
CONFIG_FIT=y
CONFIG_FIT_VERBOSE=y
CONFIG_FIT_SIGNATURE=y
CONFIG_RSA=y
CONFIG_RSA_PUBLIC_KEY_PARSER=y
CONFIG_SHA256=y

# Add identifier to U-Boot banner
CONFIG_IDENT_STRING=" (IoT-Gateway)"

# Optional splash support (if available in board defconfig)
CONFIG_CMD_BMP=y
CONFIG_BMP=y
CONFIG_VIDEO_BMP=y
CONFIG_VIDEO=y
CONFIG_DM_VIDEO=y
CONFIG_BMP_16BPP=y 
CONFIG_BMP_24BPP=y 
CONFIG_BMP_32BPP=y 


# Keep environment in a writable backend (RAUC needs to update slot vars)
# Do NOT disable saveenv or move env to NOWHERE
CONFIG_ENV_FAT_DEVICE_AND_PART="0:2"

# Remove built-in U-Boot logo to avoid brief 'boat' flicker
CONFIG_VIDEO_LOGO=n

# Disable EFI boot manager and EFI loader bootmeths.
# This gateway boots exclusively via U-Boot script; no EFI boot entries exist.
# BOOTMETH_EFI_BOOTMGR runs as a global bootmeth (before any device-specific method)
# and wastes ~0.5s on every boot probing non-existent EFI Boot#### variables.
# BOOTMETH_EFILOADER scans each device for /EFI/BOOT/bootaa64.efi — also unused.
CONFIG_BOOTMETH_EFI_BOOTMGR=n
CONFIG_BOOTMETH_EFILOADER=n
