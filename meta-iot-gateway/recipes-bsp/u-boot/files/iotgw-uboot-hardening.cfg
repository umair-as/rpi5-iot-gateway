# ── U-Boot surface reduction — token: surface_reduce ─────────────────────────
# Safe for dev and prod. None of these commands are used by the appliance
# boot path, RAUC, or field diagnostics.

# Use U-Boot's native stack protector wiring (stackprot.o/canary), not
# external KCFLAGS injection, to avoid unresolved __stack_chk symbols.
CONFIG_STACKPROTECTOR=y

# Network — netboot is gated at board level (patch 0002); remove commands too
CONFIG_CMD_NET=n
CONFIG_CMD_DHCP=n
CONFIG_CMD_TFTPBOOT=n
CONFIG_CMD_NFS=n
CONFIG_CMD_PXE=n
CONFIG_CMD_WGET=n
CONFIG_CMD_DNS=n

# Memory inspection — information disclosure and fault injection primitives
CONFIG_CMD_MD=n
CONFIG_CMD_MM=n
CONFIG_CMD_MW=n
CONFIG_CMD_MX=n
CONFIG_CMD_CRC32=n

# Legacy load — no legitimate use on appliance
CONFIG_CMD_LOADB=n
CONFIG_CMD_LOADS=n
CONFIG_CMD_FLASH=n
CONFIG_CMD_IMLS=n

# USB — already removed from boot_targets in patch 0001; remove commands too
CONFIG_CMD_USB=n
CONFIG_USB_STORAGE=n

# Information disclosure
CONFIG_CMD_LICENSE=n
CONFIG_CMD_BDINFO=n

# Boot script execution — boot.scr uses legacy image format (mkimage-wrapped
# script); removing source also prevents accidental bootflow fallback to
# boot.scr even if one exists on the FAT partition.  Mirrors renesas-rz-v2l
# 0003 patch: "# CONFIG_CMD_SOURCE is not set".
CONFIG_CMD_SOURCE=n

# CONFIG_CMD_SETEXPR is intentionally kept: RAUC bootcount decrement in the
# env-based boot scripts uses "setexpr BOOT_x_LEFT ${BOOT_x_LEFT} - 1".
# Renesas rz-v2l uses the identical pattern — setexpr is required, not a
# surface to reduce.
