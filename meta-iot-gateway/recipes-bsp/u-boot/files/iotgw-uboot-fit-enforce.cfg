# ── U-Boot FIT enforcement — token: fit_enforce ──────────────────────────────
# Safe for all image variants where FIT-signed boot is expected.
# Requires the signing public key embedded in U-Boot's DTB via
# UBOOT_SIGN_ENABLE=1 and UBOOT_SIGN_KEYDIR at build time.
#
# Since U-Boot 2025.04, CONFIG_FIT_SIGNATURE (set in the base defconfig)
# disables legacy image format by default. We reinforce that explicitly
# here to prevent accidental re-enablement.
CONFIG_LEGACY_IMAGE_FORMAT=n
