# The gateway is IPv6-native (Thread/OTBR; IPV6_MROUTE below). Built-in IPv6
# also keeps WIREGUARD and the NFT_FIB_{IPV6,INET} helpers built-in; a modular
# IPv6 stack forces them to =m.
CONFIG_IPV6=y

# VPN and industrial networking common on gateways
CONFIG_WIREGUARD=y

# SocketCAN core and common protocols
CONFIG_CAN=y
CONFIG_CAN_RAW=y
CONFIG_CAN_BCM=y

# Common CAN controllers (set drivers you actually use)
CONFIG_CAN_MCP251X=m

# VLANs
CONFIG_VLAN_8021Q=y

# Netfilter/NFTables for firewall + NAT (preferred over legacy xtables)
CONFIG_NETFILTER=y
CONFIG_NF_CONNTRACK=y
CONFIG_NF_DEFRAG_IPV4=y
CONFIG_NF_DEFRAG_IPV6=y
CONFIG_NF_TABLES=y
CONFIG_NF_TABLES_INET=y
CONFIG_NF_TABLES_IPV4=y
CONFIG_NF_TABLES_IPV6=y
CONFIG_NFT_CT=y
CONFIG_NFT_FIB_IPV4=y
CONFIG_NFT_FIB_IPV6=y
CONFIG_NFT_FIB_INET=y
CONFIG_NF_NAT=y
CONFIG_NFT_NAT=y
# NFT_CHAIN_NAT was removed in 6.18 (folded into the NFT_NAT infra, =y above).
CONFIG_NFT_MASQ=y

# Optional: ipset support (OTBR ingress sets)
CONFIG_IP_SET=y
CONFIG_IP_SET_HASH_NET=y

# Multicast routing required by OTBR backbone router mode.
# Without this, otbr-agent fails with:
# "InitMulticastRouterSock() ... Protocol not available"
CONFIG_IPV6_MROUTE=y
CONFIG_IP_MROUTE=y
