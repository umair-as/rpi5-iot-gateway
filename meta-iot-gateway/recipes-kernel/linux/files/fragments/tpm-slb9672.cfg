# TPM 2.0 over SPI (Infineon SLB9672 class devices).
CONFIG_TCG_TPM=y
CONFIG_TCG_TPM2=y
CONFIG_TCG_TIS_CORE=y
CONFIG_TCG_TIS=y
CONFIG_TCG_TIS_SPI=y
CONFIG_HW_RANDOM_TPM=y

# SPI host path for Raspberry Pi.
CONFIG_SPI=y
CONFIG_SPI_MASTER=y
CONFIG_SPI_BCM2835=y

# Developer note:
# Keep SPI userspace node disabled on the same chip-select as TPM to avoid
# driver ownership conflict. Enable only for bring-up/debug and not on TPM CS.
# CONFIG_SPI_SPIDEV=y
