# Display / GPU / Compute path on Raspberry Pi
CONFIG_DRM=y
CONFIG_DRM_VC4=y
CONFIG_DRM_V3D=y

# Media pipeline (V4L2) and USB camera support
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_CONTROLLER=y
CONFIG_VIDEO_V4L2=y
CONFIG_V4L2_MEM2MEM_DEV=m
CONFIG_USB_VIDEO_CLASS=m

# Larger pages to benefit some inference/runtime workloads
CONFIG_HUGETLBFS=y
CONFIG_HUGETLB_PAGE=y
CONFIG_TRANSPARENT_HUGEPAGE=y
