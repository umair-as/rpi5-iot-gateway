# Crash/panic diagnostics for development labs only.
# Enable during training or focused debug campaigns; remove from feature list for production.

# Persist kernel logs/traces across reboot via pstore backends.
CONFIG_PSTORE=y
CONFIG_PSTORE_RAM=y
CONFIG_PSTORE_CONSOLE=y
CONFIG_PSTORE_PMSG=y
CONFIG_PSTORE_FTRACE=y
CONFIG_MAGIC_SYSRQ=y

# Detect common hang/lockup classes at runtime.
CONFIG_DETECT_HUNG_TASK=y
CONFIG_SOFTLOCKUP_DETECTOR=y

# Keep hard lockup detector off by default on this profile; behavior can vary by platform/watchdog backend.
# CONFIG_HARDLOCKUP_DETECTOR is not set
