# Aggressive crash/panic diagnostics for development labs only.
# Layered on top of the pstore-persist fragment (which provides the actual
# capture stack). This fragment adds runtime knobs and lockup detectors that
# are unsafe defaults for fleet deployments.

# Function tracing into pstore for post-mortem trace replay.
CONFIG_PSTORE_FTRACE=y

# Dynamic debug for runtime and early-boot pr_debug instrumentation.
CONFIG_DYNAMIC_DEBUG=y
CONFIG_DYNAMIC_DEBUG_CORE=y

# Magic SysRq exposes a kernel control surface; security-relevant in prod.
CONFIG_MAGIC_SYSRQ=y

# Detect common hang/lockup classes at runtime.
CONFIG_DETECT_HUNG_TASK=y
CONFIG_SOFTLOCKUP_DETECTOR=y

# Hard lockup detector left off — backend support varies per platform/watchdog.
# CONFIG_HARDLOCKUP_DETECTOR is not set
