# Developer observability and tracing (dev builds only)
# Keep this fragment out of production profiles to avoid extra debug surface/size.

# Symbol visibility and debug metadata for tooling
CONFIG_KALLSYMS=y
CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_INFO_BTF=y
CONFIG_DEBUG_INFO_BTF_MODULES=y

# eBPF core
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y
CONFIG_CGROUP_BPF=y
CONFIG_BPF_EVENTS=y

# Tracing and perf plumbing used by bpftrace/perf/bpftool attach paths
CONFIG_PERF_EVENTS=y
CONFIG_TRACING=y
CONFIG_TRACEPOINTS=y
CONFIG_FTRACE=y
CONFIG_FUNCTION_TRACER=y
CONFIG_FUNCTION_GRAPH_TRACER=y
CONFIG_FTRACE_SYSCALLS=y

# Probe events
CONFIG_KPROBES=y
CONFIG_KPROBE_EVENTS=y
CONFIG_UPROBES=y
CONFIG_UPROBE_EVENTS=y
