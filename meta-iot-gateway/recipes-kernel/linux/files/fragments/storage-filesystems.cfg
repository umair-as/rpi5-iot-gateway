# Read-only/persistent layout and integrity support
CONFIG_OVERLAY_FS=y
# Keep dm-verity path built-in so RAUC bundle mount does not depend on
# module autoload timing during install.
CONFIG_BLK_DEV_DM=y
CONFIG_DM_BUFIO=y
CONFIG_DM_VERITY=y
# LUKS/dm-crypt runtime support.
CONFIG_DM_CRYPT=y
CONFIG_CRYPTO_XTS=y

# Compressed, read-mostly filesystem support
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_ZLIB=y
CONFIG_SQUASHFS_XZ=y
CONFIG_SQUASHFS_ZSTD=y
# Required once SELinux is active. RAUC's squashfs bundle payload is mounted by
# the running kernel during install; without xattr support SELinux has no
# per-inode label source for it and the mount fails with EOPNOTSUPP. The bundle
# squashfs already carries xattrs.
CONFIG_SQUASHFS_XATTR=y
