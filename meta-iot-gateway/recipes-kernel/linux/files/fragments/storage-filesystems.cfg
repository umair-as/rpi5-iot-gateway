# Read-only/persistent layout and integrity support
CONFIG_OVERLAY_FS=y
# Keep dm-verity path built-in so RAUC bundle mount does not depend on
# module autoload timing during install.
CONFIG_BLK_DEV_DM=y
CONFIG_DM_BUFIO=y
CONFIG_DM_VERITY=y
# LUKS/dm-crypt runtime support.
CONFIG_DM_CRYPT=y
CONFIG_CRYPTO_XTS=y

# Compressed, read-mostly filesystem support
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_ZLIB=y
CONFIG_SQUASHFS_XZ=y
CONFIG_SQUASHFS_ZSTD=y
