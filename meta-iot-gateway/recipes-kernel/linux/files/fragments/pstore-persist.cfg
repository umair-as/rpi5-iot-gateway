# Production-safe pstore RAM backend.
# Captures kernel oops/panic + console state into a 1 MiB reserved-memory
# region (provided by the BSP DT patch) so the records survive reboot.
# No runtime behavior change — capture infrastructure only.

CONFIG_PSTORE=y
CONFIG_PSTORE_RAM=y
CONFIG_PSTORE_CONSOLE=y
CONFIG_PSTORE_PMSG=y
