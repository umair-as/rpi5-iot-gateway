# ============================================================================
# IoT Gateway Production Security Hardening Configuration
# Based on: KSPP recommendations, kernel-hardening-checker, and training material
# ============================================================================

# ----------------------------------------------------------------------------
# Module Security
# ----------------------------------------------------------------------------
CONFIG_MODULE_SIG=y
CONFIG_MODULE_SIG_SHA256=y
# Let the build auto-generate a key if not provided; disable force for now
# CONFIG_MODULE_SIG_FORCE is not set

# ----------------------------------------------------------------------------
# LSM (Linux Security Modules)
# ----------------------------------------------------------------------------
# SELinux is the active MAC. AppArmor is NOT carried — no profile set is
# shipped, so it would enforce nothing. Yama (ptrace restriction), BPF and
# Landlock stack alongside as non-exclusive LSMs; Lockdown is enabled below.
# CONFIG_LSM order is the upstream-canonical stack with selinux LAST so its
# hooks see context already resolved by the others. Userspace/policy come
# from meta-selinux (packagegroup-iot-gw-selinux, refpolicy-mcs); the
# distro-features/refpolicy/enforcing wiring is in iotgw-common.inc.
# BOOTPARAM=y keeps `selinux=0` as the recovery escape; DEVELOP=y allows
# per-domain permissive during policy bring-up. See docs/SELINUX.md.
CONFIG_SECURITY=y
CONFIG_SECURITY_NETWORK=y
CONFIG_SECURITYFS=y
CONFIG_SECURITY_YAMA=y
# CONFIG_SECURITY_APPARMOR is not set
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_DEVELOP=y
CONFIG_SECURITY_SELINUX_AVC_STATS=y
CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS=9
CONFIG_SECURITY_LANDLOCK=y
CONFIG_DEFAULT_SECURITY_SELINUX=y
CONFIG_LSM="lockdown,yama,bpf,landlock,selinux"

# ----------------------------------------------------------------------------
# Seccomp - Syscall Filtering
# ----------------------------------------------------------------------------
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# ----------------------------------------------------------------------------
# Kernel Audit
# ----------------------------------------------------------------------------
CONFIG_AUDIT=y
CONFIG_AUDITSYSCALL=y

# ----------------------------------------------------------------------------
# Memory Hardening (KSPP Recommendations)
# ----------------------------------------------------------------------------
# Detect buffer overflows on string/memory functions
CONFIG_FORTIFY_SOURCE=y

# Zero memory on allocation (prevents info leaks)
CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y

# Zero memory when freed (prevents use-after-free exploits)
CONFIG_INIT_ON_FREE_DEFAULT_ON=y

# Boundary checks on kernel/userspace memory copies
CONFIG_HARDENED_USERCOPY=y

# Fill pages with poison pattern when freed
CONFIG_PAGE_POISONING=y

# Report dangerous W+X memory permissions at boot
CONFIG_DEBUG_WX=y

# Harden SLAB/SLUB allocator freelists
CONFIG_SLAB_FREELIST_HARDENED=y

# Randomize SLAB freelist order
CONFIG_SLAB_FREELIST_RANDOM=y

# Harden linked list operations
CONFIG_LIST_HARDENED=y

# ----------------------------------------------------------------------------
# Stack Protection
# ----------------------------------------------------------------------------
# Randomize kernel stack offset on each syscall
CONFIG_RANDOMIZE_KSTACK_OFFSET_DEFAULT=y
CONFIG_VMAP_STACK=y
CONFIG_STACKPROTECTOR_STRONG=y

# ----------------------------------------------------------------------------
# Toolchain Hardening (GCC Plugins)
# ----------------------------------------------------------------------------
CONFIG_GCC_PLUGINS=y

# Generate additional entropy during boot/runtime
CONFIG_GCC_PLUGIN_LATENT_ENTROPY=y

# Erase kernel stack before returning from syscalls (1% perf impact).
# Formerly GCC_PLUGIN_STACKLEAK; renamed to KSTACK_ERASE in 6.17.
CONFIG_KSTACK_ERASE=y

# Zero-initialize stack variables. Supersedes the GCC_PLUGIN_STRUCTLEAK{,_USER}
# plugins removed in 6.5; GCC_PLUGIN_ARM_SSP_PER_TASK was arm32-only and is gone
# on arm64. Pinned explicitly so intent survives a defconfig change.
CONFIG_INIT_STACK_ALL_ZERO=y

# ----------------------------------------------------------------------------
# Kernel Lockdown
# ----------------------------------------------------------------------------
# Prevent runtime modification of the kernel
CONFIG_SECURITY_LOCKDOWN_LSM=y

# ----------------------------------------------------------------------------
# Access Restrictions
# ----------------------------------------------------------------------------
# Restrict unprivileged users from reading kernel dmesg
CONFIG_SECURITY_DMESG_RESTRICT=y

# Disallow root access to all physical memory via /dev/mem
# CONFIG_DEVMEM is not set

# Remove kernel core dumps from /proc/kcore
# CONFIG_PROC_KCORE is not set
# Disable generating userspace ELF coredumps entirely.
# Known limitation: KCONFIG_MODE=--alldefconfig re-resolves this (and
# ARCH_MMAP_RND_BITS below) back to their defaults, so neither takes effect in
# the built config yet. Kept to preserve intent pending a merge-mode fix.
# CONFIG_COREDUMP is not set

# ----------------------------------------------------------------------------
# Heap and Address Space Randomization
# ----------------------------------------------------------------------------
# Disable legacy brk randomization (enables heap ASLR)
# CONFIG_COMPAT_BRK is not set
CONFIG_RANDOMIZE_BASE=y
# Increase mmap ASLR entropy on arm64
CONFIG_ARCH_MMAP_RND_BITS=30

# ----------------------------------------------------------------------------
# Attack Surface Reduction
# ----------------------------------------------------------------------------
CONFIG_SYN_COOKIES=y

# Disable misc binary format support (reduces attack surface)
# CONFIG_BINFMT_MISC is not set

# Disable kernel debugger (production systems)
# CONFIG_KGDB is not set

# Disable staging drivers (often less tested)
# CONFIG_STAGING is not set

# Trim unused exported kernel symbols when building modules
CONFIG_TRIM_UNUSED_KSYMS=y

# Disable uncommon protocols not needed for IoT gateway
# Note: SCTP is runtime blacklisted via modprobe.d due to kernel dependencies
# CONFIG_IP_SCTP is not set
# CONFIG_SCTP_COOKIE_HMAC_MD5 is not set
# CONFIG_SCTP_COOKIE_HMAC_SHA1 is not set
# CONFIG_NF_CT_PROTO_SCTP is not set
# CONFIG_NETFILTER_XT_MATCH_SCTP is not set
# CONFIG_IP_VS_PROTO_SCTP is not set
# CONFIG_INET_SCTP_DIAG is not set

# Disable legacy XFS v4 format support
# CONFIG_XFS_SUPPORT_V4 is not set
