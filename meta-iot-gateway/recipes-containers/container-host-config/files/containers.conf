[engine]
cgroup_manager = "systemd"
events_logger = "journald"
runtime = "crun"

[containers]
log_driver = "journald"
pids_limit = 4096
tz = "local"
ipcns = "private"
cgroups = "enabled"

[network]
network_backend = "netavark"
# The iotgw kernel is nftables-only (no legacy ip_tables modules); netavark's
# default iptables driver fails at container start with "Module ip_tables not
# found".
firewall_driver = "nftables"
