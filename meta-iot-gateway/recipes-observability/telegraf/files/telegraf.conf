# Industrial IoT Gateway (lean profile, no CAN)

###############################################################################
# SECRET STORE
###############################################################################

# Reads secrets from $CREDENTIALS_DIRECTORY populated by systemd LoadCredential=.
# Credentials land in /run/credentials/telegraf.service/ as 0400 files owned
# by the telegraf user — never in the process environment or argv.
# Reference syntax: @{systemd:<key>}  (prefix "" means filenames are the keys)
[[secretstores.systemd]]
  id = "systemd"
  prefix = ""

[global_tags]
  site = "plant-a"
  role = "iot-gateway"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false

###############################################################################
# OUTPUTS
###############################################################################

[[outputs.influxdb]]
  urls = ["${INFLUXDB_URL}"]
  database = "${INFLUXDB_DATABASE}"
  username = "@{systemd:influxdb_username}"
  password = "@{systemd:influxdb_password}"

###############################################################################
# INPUTS - SYSTEM HEALTH
###############################################################################

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.system]]

[[inputs.temp]]

[[inputs.processes]]

[[inputs.net]]
  # Glob patterns — matches eth0, wlan0 on RPi5; survives rename to eth1 etc.
  interfaces = ["eth*", "wlan*"]

###############################################################################
# INPUTS - MESSAGING
###############################################################################

[[inputs.mqtt_consumer]]
  servers = ["tcp://localhost:1883"]
  username = "@{systemd:mqtt_username}"
  password = "@{systemd:mqtt_password}"
  startup_error_behavior = "retry"
  topics = ["sensors/+/data"]
  data_format = "json"

###############################################################################
# INPUTS - INDUSTRIAL PROTOCOLS
###############################################################################

# Modbus is intentionally disabled by default on this gateway profile.
# Enable explicit site-specific stanzas only when devices/endpoints exist.
#
# Example Modbus TCP (PLC):
# [[inputs.modbus]]
#   name = "plc_valve_controller"
#   slave_id = 1
#   timeout = "1s"
#   controller = "tcp://192.168.1.50:502"
#   holding_registers = [
#     { name = "valve_position", byte_order = "AB", data_type = "UINT16", address = [100], scale = 1.0 },
#     { name = "flow_rate", byte_order = "ABCD", data_type = "FLOAT32-IEEE", address = [102, 103], scale = 1.0 },
#   ]
#
# Example Modbus RTU (RS485 sensor):
# [[inputs.modbus]]
#   name = "rs485_sensor"
#   slave_id = 2
#   timeout = "2s"
#   controller = "file:///dev/ttyUSB0"
#   baud_rate = 9600
#   data_bits = 8
#   parity = "N"
#   stop_bits = 1
#   transmission_mode = "RTU"
#   holding_registers = [
#     { name = "pressure", byte_order = "AB", data_type = "INT16", address = [200], scale = 1.0 },
#   ]

###############################################################################
# INPUTS - TELEGRAF SELF-MONITORING
###############################################################################

[[inputs.internal]]
