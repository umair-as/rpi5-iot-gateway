# IoT Gateway kernel module blacklist
# Prevents auto-loading of modules that are built but not needed

# SCTP - Stream Control Transmission Protocol
# Uncommon protocol used for telecom signaling, not needed for typical IoT
blacklist sctp
blacklist sctp_diag

# Stronger preventions: refuse manual modprobe
install sctp /bin/false
install sctp_diag /bin/false

# Add additional modules here as needed
# Examples:
# blacklist bluetooth  # If Bluetooth not used
# blacklist can        # If CAN bus not used
