[Unit]
# The first-boot relabel (fixfiles) must run after /data and the OverlayFS
# uppers are mounted, so the merged /etc, /var, /home and /root (whose upperdir
# lives on /data) are traversed and their upper inodes get labeled. The upstream
# unit is only Before=sysinit.target with no ordering against these, so it can be
# scheduled before the overlays exist and relabel an incomplete tree.
After=data.mount overlayfs-setup.service
RequiresMountsFor=/data
