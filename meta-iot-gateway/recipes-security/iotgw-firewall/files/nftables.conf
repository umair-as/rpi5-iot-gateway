# Simple baseline nftables ruleset (IPv4/IPv6)
# Do not flush the whole ruleset; other services (e.g. OTBR) manage their own tables.
delete table inet filter

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    # Basic sanity
    iifname "lo" accept

    # Established/related
    ct state established,related accept

    # ICMP/ICMPv6 (ping, errors)
    ip protocol icmp accept
    ip6 nexthdr icmpv6 accept

    # SSH
    tcp dport 22 accept
    @OTBR_RULES@
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;
    ct state established,related accept
    # Allow forwarding when acting as a gateway (adjust as needed)
    accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}
