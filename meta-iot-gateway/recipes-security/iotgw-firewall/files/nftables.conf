# Simple baseline nftables ruleset (IPv4/IPv6)
flush ruleset

table inet filter {
  sets {
    tcp_services = { type inet_service; flags interval; elements = { 22 } }
  }

  chain input {
    type filter hook input priority 0;
    ct state invalid drop
    iif lo accept
    ct state established,related accept

    # Allow ping
    ip protocol icmp accept
    ip6 nexthdr ipv6-icmp accept

    # Allow SSH
    tcp dport @tcp_services accept

    # mDNS (optional, uncomment if needed)
    # udp dport 5353 accept

    # Default drop
    drop
  }

  chain forward {
    type filter hook forward priority 0;
    ct state invalid drop
    ct state established,related accept
    # Allow LAN forwarding if acting as gateway
    accept
  }

  chain output {
    type filter hook output priority 0;
    accept
  }
}

