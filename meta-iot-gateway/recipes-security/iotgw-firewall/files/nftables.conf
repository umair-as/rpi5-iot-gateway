# Simple baseline nftables ruleset (IPv4/IPv6)
flush ruleset

table inet filter {
  sets {
    tcp_services = { type inet_service; flags interval; elements = { 22 } }
  }

  chain input {
    type filter hook input priority filter;
    policy drop;

    # Basic sanity
    iif lo accept

    # Established/related
    ct state { established, related } accept

    # ICMP/ICMPv6 (ping, errors)
    meta l4proto { icmp, icmpv6 } accept

    # SSH
    tcp dport @tcp_services accept
  }

  chain forward {
    type filter hook forward priority filter;
    policy drop;
    ct state { established, related } accept
    # Allow forwarding when acting as a gateway (adjust as needed)
    accept
  }

  chain output {
    type filter hook output priority filter;
    policy accept;
  }
}
