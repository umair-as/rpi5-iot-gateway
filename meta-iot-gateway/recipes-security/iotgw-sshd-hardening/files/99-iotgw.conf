# IoT Gateway SSH server policy (development-friendly defaults)
# - Allow key-based auth
# - Keep password auth enabled for convenience (dev images)
# - Root login allowed only via keys (no password)

# Display legal banner before authentication
Banner /etc/issue.net

PubkeyAuthentication yes
PasswordAuthentication yes
KbdInteractiveAuthentication yes

# Safer root policy for development
PermitRootLogin prohibit-password

# Show legal banner before authentication over SSH
Banner /etc/issue.net

# Avoid double MOTD (PAM usually shows /etc/motd)
PrintMotd no
PrintLastLog yes

# Mild rate limiting / UX tuning
LoginGraceTime 30s
MaxAuthTries 6
MaxSessions 10
