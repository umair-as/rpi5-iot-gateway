# systemd-tmpfiles configuration for edge-healthd
# Creates the state directory with proper ownership

# Type Path                Mode User       Group      Age Argument
d      /data/edge/health    0755 edgehealth  edgehealth  -   -

# The read ACL that lets edgehealth classify crash dumps is applied to the /data
# backing path in iotgw-pstore-persist's tmpfiles, not here — see that file for why.
