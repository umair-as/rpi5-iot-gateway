# systemd-tmpfiles configuration for edge-healthd
# Creates the state directory with proper ownership

# Type Path                Mode User       Group      Age Argument
d      /data/edge/health    0755 edgehealth  edgehealth  -   -

# Grant edge-healthd (edgehealth) read access to kernel crash dumps so CrashProbe
# can classify panics. The systemd-pstore archive is 0700 root by default, so the
# unprivileged daemon is otherwise blind to it. A+ applies recursively to existing
# dumps; the d:u default entry covers dumps written on future boots. Least-privilege
# alternative to AmbientCapabilities=CAP_DAC_READ_SEARCH on the daemon.
# (Under SELinux enforcing, a matching MAC policy rule is also required — M3.)
A+     /var/lib/systemd/pstore  -    -           -           -   u:edgehealth:rX,d:u:edgehealth:rX
