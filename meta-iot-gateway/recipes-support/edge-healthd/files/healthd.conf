{
  "device_id": "",
  "platform": "rpi5",
  "collect_interval_sec": 60,
  "sample_window_sec": 60,

  "monitored_services": [
    "sshd.socket",
    "NetworkManager.service",
    "mosquitto.service",
    "telegraf.service",
    "influxdb.service"
  ],

  "monitored_mounts": [
    "/",
    "/data"
  ],

  "monitored_interfaces": [],

  "enable_ptp": false,
  "enable_ntp": true,
  "enable_thermal": true,
  "enable_update_tracking": true,

  "thresholds": {
    "cpu_load_warn": 80,
    "cpu_load_crit": 95,
    "mem_used_warn": 80,
    "mem_used_crit": 95,
    "disk_used_warn": 80,
    "disk_used_crit": 95,
    "temp_warn_c": 70.0,
    "temp_crit_c": 85.0,
    "ptp_offset_warn_ns": 10000,
    "ptp_offset_crit_ns": 100000,
    "service_restart_warn": 3,
    "service_restart_crit": 10,
    "boot_fail_warn": 1,
    "boot_fail_crit": 3
  }
}
