# Gateway & container-friendly sysctl defaults

# Enable forwarding (gateway scenarios)
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# TCP keepalives (keep NAT/firewalls happy for long-lived MQTT connections)
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Socket buffers for higher throughput
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Port range and fastopen
net.ipv4.ip_local_port_range = 1024 65535
net.ipv4.tcp_fastopen = 3

# ICMP rate limit sane
net.ipv4.icmp_ratelimit = 100
net.ipv4.icmp_ratemask = 6168

# Inotify for containers and dev tools
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 1048576

# Map count for certain services (databases/search)
vm.max_map_count = 262144

