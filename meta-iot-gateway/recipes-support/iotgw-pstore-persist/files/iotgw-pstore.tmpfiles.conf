# /data-backed pstore archive directory used by systemd-pstore.service.
# The bind onto /var/lib/systemd/pstore is performed by var-lib-systemd-pstore.mount.
d /data/crash        0755 root root - -
d /data/crash/pstore 0700 root root - -

# Grant edge-healthd (edgehealth) read access to the crash dumps so its CrashProbe
# can classify panics. Applied to the /data backing path — NOT the
# /var/lib/systemd/pstore mountpoint — because var-lib-systemd-pstore.mount binds
# this directory over that mountpoint after systemd-tmpfiles-setup runs; an ACL on
# the mountpoint would be hidden by the bind, whereas one on the backing inode
# shows through. systemd-pstore's 0700-root archive is otherwise opaque to the
# unprivileged daemon. The d:u default entry covers dumps written on future boots.
# Skipped as a no-op on images without edge-healthd (edgehealth user absent).
# (Under SELinux enforcing, a matching MAC policy rule is also required.)
A+ /data/crash/pstore - - - - u:edgehealth:rX,d:u:edgehealth:rX
