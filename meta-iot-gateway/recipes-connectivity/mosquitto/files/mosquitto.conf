# Mosquitto MQTT Broker Configuration for IoT Gateway
# Place your configuration here

# Network settings
listener 1883
protocol mqtt

# Security (adjust for production!)
allow_anonymous true

# Logging
log_dest stderr
log_type all

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Websockets support (uncomment if needed)
# listener 9001
# protocol websockets
