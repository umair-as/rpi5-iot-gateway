# Mosquitto MQTT Broker Configuration for IoT Gateway

# Persist retained messages/sessions in writable state dir.
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 180

# Keep logs useful but not overly verbose by default.
log_dest stderr
log_timestamp true
connection_messages false
log_type error
log_type warning
log_type notice

# Listener for gateway/client MQTT traffic.
listener 1883
protocol mqtt

# Basic abuse controls.
allow_zero_length_clientid false
max_inflight_messages 32
max_queued_messages 512
max_packet_size 1048576
message_size_limit 1048576

# Additional hardening/auth policy.
include_dir /etc/mosquitto/conf.d
