# Security policy for IoT Gateway Mosquitto broker.
#
# This default is fail-closed:
# - anonymous clients are denied
# - password file must contain valid users
# - ACL file defines per-user topic permissions
#
# Add users with:
#   mosquitto_passwd -b /etc/mosquitto/passwd <user> <strong-password>
# Then adjust /etc/mosquitto/acl as needed.

allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl
