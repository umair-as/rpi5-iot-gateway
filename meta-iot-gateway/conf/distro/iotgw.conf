INIT_MANAGER ?= "systemd"

DISTRO = "iotgw"
DISTRO_NAME = "IoT Gateway OS"

# Match Poky's default package format unless intentionally changed
PACKAGE_CLASSES ?= "package_rpm"

# Use Uninative to stabilize native toolchain across host distros
INHERIT += "uninative"
require conf/distro/include/yocto-uninative.inc

# Security hardening (PIE, stack protector, FORTIFY_SOURCE, RELRO)
require conf/distro/include/iotgw-security.inc

# Centralized common settings (branding, versioning, QA, RAUC, SDK)
require conf/distro/include/iotgw-common.inc
