# conf and classes directories live under this layer; append to BBPATH
BBPATH .= ":${LAYERDIR}"

# Recipe directories are included explicitly to avoid always pulling RAUC bundles.
# Core/image/packagegroups stay in recipes-core
BBFILES += " \
  ${LAYERDIR}/recipes-core/images/*.bb \
  ${LAYERDIR}/recipes-core/packagegroups/*.bb \
  ${LAYERDIR}/recipes-core/base-files/*.bbappend \
  ${LAYERDIR}/recipes-compliance/*/*.bb \
  ${LAYERDIR}/recipes-network/*/*.bb \
  ${LAYERDIR}/recipes-security/*/*.bb \
  ${LAYERDIR}/recipes-connectivity/*/*.bb \
  ${LAYERDIR}/recipes-devtools/*/*.bb \
  ${LAYERDIR}/recipes-kernel/*/*.bb \
  ${LAYERDIR}/recipes-bsp/*/*.bb \
  ${LAYERDIR}/recipes-bsp/bootimage/*.bb \
  ${LAYERDIR}/recipes-bsp/bootlogo/*.bb \
  ${LAYERDIR}/recipes-support/*/*.bb \
  ${LAYERDIR}/recipes-observability/*/*.bb \
  ${LAYERDIR}/recipes-graphics/*/*.bb \
  ${LAYERDIR}/recipes-ota/rauc/*.bb \
  ${LAYERDIR}/recipes-ota/ota-*/*.bb \
  ${LAYERDIR}/recipes-*/*/*.bbappend \
"

# Include RAUC bundle recipes only when RAUC is enabled in DISTRO_FEATURES
BBFILES += "${@bb.utils.contains('DISTRO_FEATURES', 'rauc', ' ${LAYERDIR}/recipes-ota/bundles/*.bb', '', d)}"

# TPM2 userspace customization bbappends target recipes provided by
# meta-secure-core/meta-tpm2 (collection "tpm2"), which is only composed with
# the kas/tpm.yml overlay. Parse them dynamically so they apply when meta-tpm2
# is present and are skipped otherwise (wrynose removed the global
# BB_DANGLINGAPPENDS_WARNONLY). They live under dynamic-layers/ so the general
# recipes-*/*/*.bbappend pattern above does not pick them up unconditionally.
BBFILES_DYNAMIC += " \
    tpm2:${LAYERDIR}/dynamic-layers/tpm2/recipes-security/*/*.bbappend \
"

BBFILE_COLLECTIONS += "iot-gateway-layer"
BBFILE_PATTERN_iot-gateway-layer = "^${LAYERDIR}/"
BBFILE_PRIORITY_iot-gateway-layer = "10"

LAYERDEPENDS_iot-gateway-layer = "core"
LAYERSERIES_COMPAT_iot-gateway-layer = "wrynose"
