# git-cliff configuration for rpi5-iot-gw release notes.
#
# This repo has a project-native commit history: recent work often uses
# Conventional-style subjects, while older work uses area-first subjects such as
# "ota:", "rauc:", "kernel:", and "fit:". Do not enforce a new commit style just
# to feed release notes; keep the parser broad enough to describe the existing
# history.

[changelog]
header = """
# Release Notes

Generated by [git-cliff](https://github.com/orhun/git-cliff) from the git
history.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}]\
        {% if remote.github.owner and remote.github.repo and previous.version %} \
            (https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ previous.version }}...{{ version }})\
        {%- endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
            {% if remote.github.owner and remote.github.repo %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }})){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_preprocessors = [
    { pattern = '\s*Co-authored-by:.*', replace = "" },
    { pattern = '\s*Signed-off-by:.*', replace = "" },
]

# First match wins. The HTML comments force section ordering and are stripped by
# the template. Keep broad area-first parsers because this repository predates a
# strict Conventional Commit flow and should not change commit culture for
# tooling.
commit_parsers = [
    { message = "^Merge pull request", skip = true },
    { message = "^chore\\(release\\): prep|^build\\(version\\): bump|^docs\\(changelog\\):", skip = true },
    { message = "^feat\\((fit|u-boot|uboot|boot)\\)|^(fit|boot|uboot|u-boot|rauc/boot):|FIT|YubiKey|signing", group = "<!-- 0 -->Boot, FIT, and Signing" },
    { message = "^feat\\((rauc|ota)", group = "<!-- 1 -->OTA and RAUC" },
    { message = "^(ota|rauc|ota-updater|ota-certs)(/[^:]+)?:", group = "<!-- 1 -->OTA and RAUC" },
    { message = "^feat\\((otbr|network|wifi)|^(otbr|network|firewall|systemd/network):", group = "<!-- 2 -->Networking" },
    { message = "^(feat|fix|chore|refactor|test)\\([^)]*\\): .*(CVE|security|harden|hardening|TPM|tpm|LUKS|luks|audit|nftables|ssh)", group = "<!-- 3 -->Security" },
    { message = "^(security|hardening|audit|tpm|tpm2|luks|nftables|ssh):", group = "<!-- 3 -->Security" },
    { message = "^fix\\(", group = "<!-- 4 -->Fixes" },
    { message = "^(kernel|bsp|rpi5):|^feat\\(kernel\\)|^fix\\(kernel\\)", group = "<!-- 5 -->Kernel and BSP" },
    { message = "^chore\\((kas|meta-iot-gateway|iotgw|kernel)|^chore:|^build\\(|^kas:|^distro:|^image\\(|^packagegroups:", group = "<!-- 6 -->Build, Yocto, and Packaging" },
    { message = "observability|telegraf|edge-healthd|mosquitto|influxdb", group = "<!-- 7 -->Observability" },
    { message = "^docs|^docs\\(|documentation|README", group = "<!-- 8 -->Documentation" },
    { message = "^test\\(|^tests?:", group = "<!-- 9 -->Testing" },
    { message = "^perf\\(", group = "<!-- 10 -->Performance" },
    { message = "^refactor\\(", group = "<!-- 11 -->Refactor" },
    { message = "^revert|^Revert", group = "<!-- 12 -->Reverts" },
    { message = ".*", group = "<!-- 13 -->Other" },
]

protect_breaking_commits = true
filter_commits = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"
