header:
  version: 18

distro: iotgw

machine: raspberrypi5

target:
  - iot-gw-image-base

repos:

  # Upstream Yocto layers — SHA-pinned to the wrynose (Yocto 6.0) baseline so
  # shared native/cross/allarch sstate and source downloads are reused. Layers
  # resolve via git alternates from KAS_REPO_REF_DIR (see Makefile); pins stay
  # enforced.
  bitbake:
    url: https://git.openembedded.org/bitbake
    # yocto-6.0 tag
    commit: 33581c84f3a85008239acbd940501a35de48dc91
    layers: {}

  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    # yocto-6.0 tag
    commit: 42fa856a00ac16b2a7a83d7ecfa60a5be192b16c
    layers:
      meta:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    # wrynose HEAD at baseline
    commit: 420222862f5a6d95023b8f5f3b7e1808b2264ef9
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    # No wrynose branch upstream (agherzan/meta-raspberrypi#1598); master
    # carries LAYERSERIES_COMPAT=wrynose. Pinned by commit.
    branch: master
    commit: b0f0a6c0bfbf5d0e464c13944dda73fa69f31f6b

  meta-virtualization:
    url: https://git.yoctoproject.org/meta-virtualization
    branch: wrynose
    commit: 781735b97ae5013cacabbecd38e6da6b510cf3fb

  # meta-rust-bin dropped: wrynose OE-core ships rust/cargo 1.94.1 (the version
  # meta-rust-bin used to pin), and meta-rust-bin master lacks wrynose
  # LAYERSERIES_COMPAT. tpm-ops now inherits the OE-core `cargo` class instead
  # of `cargo_bin`.

  # SELinux MAC stack: libselinux/policycoreutils/setools, the refpolicy
  # variants, packagegroup-core-selinux, and selinux-image.bbclass. Also
  # ships ~36 <recipe>_%.bbappend files that flip PACKAGECONFIG[selinux] on
  # in oe-core/meta-oe recipes (systemd, dbus, openssh, sudo, PAM, ...)
  # whenever DISTRO_FEATURES contains "selinux". The distro-features wiring
  # lives in iotgw-common.inc; the kernel-side LSM symbols in
  # security-prod.cfg. See docs/SELINUX.md.
  meta-selinux:
    url: https://git.yoctoproject.org/meta-selinux
    branch: wrynose
    commit: 1c3a699f363167571ab39fecb0fe6f56691a4e20

  # Project layer lives in this repo. No url/path: kas resolves it against the
  # repo containing this kas file, so layer paths under `layers:` are relative
  # to the repo root. Sidesteps the path:-vs-KAS_WORK_DIR interaction — a bare
  # `path: meta-iot-gateway` resolves to .kas/meta-iot-gateway once
  # KAS_WORK_DIR=.kas is set (see Makefile).
  rpi5-iot-gw:
    layers:
      meta-iot-gateway:

bblayers_conf_header:
  standard: |
    BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

local_conf_header:
  standard: |
    CONF_VERSION = "2"

  diskmon: |
    BB_DISKMON_DIRS = "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

  buildinfo: |
    INHERIT += "buildhistory"
    BUILDHISTORY_COMMIT = "1"
  spdx_disable: |
    # Keep SBOM/CVE generation opt-in via kas/cve.yml to save disk/time on
    # normal image builds. Wrynose's sbom-cve-check flow enables create-spdx
    # when the CVE overlay is composed.
    IOTGW_CREATE_SPDX_DISABLE ?= "create-spdx"
    INHERIT:remove = "${IOTGW_CREATE_SPDX_DISABLE}"

  optimize: |
    USER_CLASSES = "buildstats"

  parallel: |
    BB_NUMBER_THREADS = "10"
    PARALLEL_MAKE = "-j12"
  rm_work: |
    # Reduce disk usage by discarding intermediate workdirs
    INHERIT += "rm_work"

  rpi_hardware: |
    ENABLE_SPI_BUS = "1"
    ENABLE_I2C = "1"
    ENABLE_UART = "1"

  rpi_display: |
    DISABLE_OVERSCAN = "1"
    DISABLE_SPLASH = "1"

  rpi_extras: |
    # Accept the Synaptics WiFi/BT firmware license flag required on RPi
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

  image_hw_modules: |
    KERNEL_MODULE_AUTOLOAD:append = " i2c-dev"

  prefer_bin_node: |
    # Use prebuilt Node.js binary to avoid long V8 builds
    PREFERRED_PROVIDER_nodejs = "nodejs-bin"

  sanity_check: |
    # Add Ubuntu 24.04 to tested distributions to avoid warnings
    SANITY_TESTED_DISTROS:append = " ubuntu-24.04"

  hashserve: |
    # Enable hash equivalence for better sstate reuse. Put the hashequiv DB in
    # the shared SSTATE location (not inside build/) so hash-equivalence — and
    # therefore native/cross/allarch sstate — is reused across builds sharing
    # the same SSTATE_DIR.
    BB_HASHSERVE = "auto"
    BB_HASHSERVE_DB_DIR = "${SSTATE_DIR}"
