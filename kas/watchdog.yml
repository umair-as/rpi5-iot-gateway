header:
  version: 18
  includes:
    - "rpi5.yml"

local_conf_header:
  systemd_hw_watchdog: |
    # Watchdog profile. /dev/watchdog0 ships via mainline BCM2712 PM support
    # (kernel 6.18.37+). IOTGW_ENABLE_HW_WATCHDOG (default "1" in
    # iotgw-common.inc) gates only the userspace/systemd wiring, not the kernel
    # device. Userspace use of the watchdog (systemd PID1 feeding,
    # per-image RuntimeWatchdogSec/ShutdownWatchdogSec) is held off pending a
    # fix for the systemd PID1 ping path on BCM2712 — pings opening
    # /dev/watchdog0 announce a timeout but the hardware fires at the first
    # interval rather than being kept alive.
    #
    # Defaults below are weak so kas/local.yml can hard-override after the
    # PID1 bug is fixed (set to "1" + adjust RUNTIME/SHUTDOWN seconds).
    IOTGW_ENABLE_SYSTEMD_HW_WATCHDOG ?= "0"
    IOTGW_SYSTEMD_RUNTIME_WATCHDOG_SEC ?= "20s"
    IOTGW_SYSTEMD_SHUTDOWN_WATCHDOG_SEC ?= "30s"

  uboot_watchdog: |
    # U-Boot watchdog evaluation. This enables the BCM2835/BCM2711 watchdog
    # command/driver and the IoT Gateway boot policy that arms the watchdog
    # during U-Boot RAUC/FIT work, then stops it before bootm. This is separate
    # from systemd PID1 watchdog feeding above.
    IOTGW_UBOOT_FEATURES:append = " watchdog"
