header:
  version: 18
  includes:
    - "rpi5.yml"

distro: iotgw

repos:
  # meta-lts-mixins removed: wrynose ships stock u-boot 2026.01.
  # meta-rauc-community/meta-rauc-raspberrypi dropped: the only bits our
  # images consumed (rauc-grow-data-part subpackage, u-boot-fw-utils/
  # u-boot-env RDEPENDS, /data mount point) are absorbed into
  # meta-iot-gateway (recipes-ota/rauc/rauc_%.bbappend, base-files
  # bbappend). Everything else there (rauc-conf, rpi-u-boot-scr boot flow,
  # linux-raspberrypi cfg, example keys, wic) was already superseded by the
  # custom RAUC/FIT setup.

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: wrynose
    commit: 38da0e5866a953e664001ba90b5edad68d68cd5d

local_conf_header:
  rauc_providers: |
    PREFERRED_RPROVIDER_virtual-rauc-conf = "rauc-conf-iotgw"
  boot_splash_opt_in: |
    # To include the U-Boot splash image in the boot (FAT) partition, uncomment:
    # FATPAYLOAD += " /boot/splash.bmp"
