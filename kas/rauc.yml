header:
  version: 18
  includes:
    - "rpi5.yml"

distro: iotgw

repos:
  # meta-lts-mixins removed: wrynose ships stock u-boot 2026.01, and
  # meta-rauc-raspberrypi master no longer LAYERDEPENDS the u-boot mixin.

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: wrynose
    commit: 38da0e5866a953e664001ba90b5edad68d68cd5d

  meta-rauc-community:
    url: https://github.com/rauc/meta-rauc-community.git
    # No wrynose branch; master meta-rauc-raspberrypi/conf/layer.conf is
    # LAYERSERIES_COMPAT=wrynose and dropped the lts-u-boot-mixin dep.
    branch: master
    commit: 00228100ab6dfb4ea53514c15cba02c0d2fa985e
    layers:
      meta-rauc-raspberrypi:

local_conf_header:
  rauc_providers: |
    PREFERRED_RPROVIDER_virtual-rauc-conf = "rauc-conf-iotgw"
  boot_splash_opt_in: |
    # To include the U-Boot splash image in the boot (FAT) partition, uncomment:
    # FATPAYLOAD += " /boot/splash.bmp"
