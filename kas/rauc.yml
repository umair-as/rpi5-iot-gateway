header:
  version: 18
  includes:
    - "rpi5.yml"

distro: iotgw

repos:
  meta-lts-mixins:
    url: https://github.com/yoctoproject/meta-lts-mixins.git
    branch: scarthgap/u-boot
    layers:
      .:

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: scarthgap

  meta-rauc-community:
    url: https://github.com/rauc/meta-rauc-community.git
    branch: scarthgap
    layers:
      meta-rauc-raspberrypi:

local_conf_header:
  rauc_providers: |
    PREFERRED_RPROVIDER_virtual-rauc-conf = "rauc-conf-iotgw"
  boot_splash_opt_in: |
    # To include the U-Boot splash image in the boot (FAT) partition, uncomment:
    # FATPAYLOAD += " /boot/splash.bmp"
