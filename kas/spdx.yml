header:
  version: 18
  includes:
    - "rpi5.yml"

# SPDX overlay. Wrynose ships SPDX 3.0 only (2.2/2.3 removed); create-spdx is
# now the 3.0 generator, so the SPDX_VERSION pin is dropped.
local_conf_header:
  spdx: |
    INHERIT += "create-spdx"
    SPDX_INCLUDE_SOURCES ?= "0"
    # Optional: pack SPDX source archives (tar.gz)
    # SPDX_ARCHIVE_PACKED = "0"
