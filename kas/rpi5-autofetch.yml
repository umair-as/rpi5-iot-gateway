header:
  version: 18

distro: iotgw

machine: raspberrypi5

target:
  - iot-gw-image

repos:
  # Full standalone wrynose stack (SHA-pinned to match rpi5.yml / kas/rauc.yml
  # / kas/tpm.yml). Kept in lockstep with those files; meta-security and
  # meta-lts-mixins removed for wrynose.
  bitbake:
    url: https://git.openembedded.org/bitbake
    commit: 33581c84f3a85008239acbd940501a35de48dc91
    layers: {}
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    commit: 42fa856a00ac16b2a7a83d7ecfa60a5be192b16c
    layers:
      meta:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    commit: 420222862f5a6d95023b8f5f3b7e1808b2264ef9
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    branch: master
    commit: b0f0a6c0bfbf5d0e464c13944dda73fa69f31f6b

  meta-virtualization:
    url: https://git.yoctoproject.org/meta-virtualization
    branch: wrynose
    commit: 781735b97ae5013cacabbecd38e6da6b510cf3fb

  meta-secure-core:
    url: https://github.com/Wind-River/meta-secure-core
    branch: wrynose
    commit: 07a99ae241acd488a2feda1ededf87dc70dfde80
    layers:
      meta-tpm2:
      meta-signing-key:
      meta-integrity:

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: wrynose
    commit: 38da0e5866a953e664001ba90b5edad68d68cd5d

  # meta-rauc-community dropped — see kas/rauc.yml for the absorption note.

  # Project layer lives in this repo (see rpi5.yml for the rationale on the
  # no-url/path current-repo form vs KAS_WORK_DIR).
  rpi5-iot-gw:
    layers:
      meta-iot-gateway:

bblayers_conf_header:
  standard: |
    BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

local_conf_header:
  standard: |
    CONF_VERSION = "2"

  diskmon: |
    BB_DISKMON_DIRS = "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

  buildinfo: |
    INHERIT += "buildhistory"
    BUILDHISTORY_COMMIT = "1"
  spdx_disable: |
    # Keep SBOM/CVE generation opt-in via kas/cve.yml to save disk/time on
    # normal image builds. kas/cve.yml clears this toggle before explicitly
    # enabling the wrynose create-spdx + sbom-cve-check flow.
    IOTGW_CREATE_SPDX_DISABLE ?= "create-spdx"
    INHERIT:remove = "${IOTGW_CREATE_SPDX_DISABLE}"

  optimize: |
    USER_CLASSES = "buildstats"

  parallel: |
    BB_NUMBER_THREADS = "10"
    PARALLEL_MAKE = "-j12"
  rm_work: |
    # Reduce disk usage by discarding intermediate workdirs
    INHERIT += "rm_work"

  rpi_hardware: |
    ENABLE_SPI_BUS = "1"
    ENABLE_I2C = "1"
    ENABLE_UART = "1"

  rpi_display: |
    DISABLE_OVERSCAN = "1"
    DISABLE_SPLASH = "1"

  rpi_extras: |
    # Accept the Synaptics WiFi/BT firmware license flag required on RPi
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

  image_hw_modules: |
    KERNEL_MODULE_AUTOLOAD:append = " i2c-dev"

  prefer_bin_node: |
    # Use prebuilt Node.js binary to avoid long V8 builds
    PREFERRED_PROVIDER_nodejs = "nodejs-bin"

  sanity_check: |
    # Add Ubuntu 24.04 to tested distributions to avoid warnings
    SANITY_TESTED_DISTROS:append = " ubuntu-24.04"
  hashserve: |
    # Enable hash equivalence for better sstate reuse
    BB_HASHSERVE = "auto"
  rauc_providers: |
    PREFERRED_RPROVIDER_virtual-rauc-conf = "rauc-conf-iotgw"
  boot_splash_opt_in: |
    # To include the U-Boot splash image in the boot (FAT) partition, uncomment:
    # FATPAYLOAD += " /boot/splash.bmp"
