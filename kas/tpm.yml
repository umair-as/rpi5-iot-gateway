header:
  version: 18

repos:
  meta-secure-core:
    url: https://github.com/Wind-River/meta-secure-core.git
    branch: wrynose
    commit: 07a99ae241acd488a2feda1ededf87dc70dfde80
    layers:
      meta-secure-core-common:
      meta-signing-key:
      meta-tpm2:
      # Phase 2: uncomment for LUKS-encrypted /data with TPM-sealed keys
      # meta-encrypted-storage:

local_conf_header:
  tpm_spi: |
    # Enable TPM2 over SPI (Infineon SLB9672 class profile + overlay wiring).
    IOTGW_ENABLE_TPM_SLB9672 = "1"
    # Optional overlay override if wiring/CS differs:
    # IOTGW_TPM_DTO_OVERLAY = "tpm-slb9670"

    # TPM2 userspace comes from meta-secure-core/meta-tpm2. The former
    # BBMASK block that suppressed meta-security/meta-tpm duplicates is gone:
    # meta-security is no longer in the layer stack (wrynose migration), so
    # there is no overlapping provider to mask.
